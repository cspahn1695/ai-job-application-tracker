<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Background</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
</head>

<body class="p-4">

<div class="container">

  <div class="d-flex justify-content-between mb-4">
    <h2>My Background</h2>

    <button onclick="goToApp()" class="btn btn-secondary">
      Back to Applications
    </button>
  </div>

  <!-- SKILLS -->
  <div class="mb-4">
    <h4>My Skills</h4>
    <input id="skillInput" class="form-control mb-2" placeholder="Add skill">
    <button onclick="addSkill()" class="btn btn-success mb-2">Add Skill</button>
    <ul id="skillsList"></ul>
  </div>

  <!-- EDUCATION -->
  <div class="mb-4">
    <h4>My Education</h4>
    <input id="educationInput" class="form-control mb-2" placeholder="Add education">
    <button onclick="addEducation()" class="btn btn-success mb-2">Add Education</button>
    <ul id="educationList"></ul>
  </div>

  <!-- EXPERIENCE -->
  <div class="mb-4">
    <h4>My Experience</h4>
    <input id="experienceInput" class="form-control mb-2" placeholder="Add experience">
    <button onclick="addExperience()" class="btn btn-success mb-2">Add Experience</button>
    <ul id="experienceList"></ul>
  </div>

  <!-- JOB RECOMMENDATIONS -->
  <div class="mb-4">
    <h4>Job Recommendations</h4>

    <input id="cityInput" class="form-control mb-2" placeholder="Enter target city">
    <button onclick="getJobs()" class="btn btn-primary">
      Find Jobs
    </button>

    <ul id="jobResults"></ul>
  </div>

</div>

<script src="/static/background.js"></script>


</body>
</html>
