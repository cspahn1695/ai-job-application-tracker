<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Application Tracker</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="/static/style.css" />
</head>

<body class="py-4">

  <!-- ================= LOGIN VIEW ================= -->
  <div id="loginView" class="d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4" style="width: 320px;">
      <h3 class="mb-3 text-center">Login</h3>

      <input id="email" class="form-control mb-2" placeholder="Email" />
      <input id="password" type="password" class="form-control mb-2" placeholder="Password" />

      <button onclick="login()" class="btn btn-primary w-100 mb-2">
        Login
      </button>

      <button onclick="register()" class="btn btn-secondary w-100">
        Register
      </button>
    </div>
  </div>


  <!-- ================= APP VIEW ================= -->
  <div id="appView" style="display:none;">

    <div class="container">

      <!-- Top Bar -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div id="userInfo"></div>

        <div>
          <button onclick="goToBackground()" class="btn btn-info me-2">
            My Background
          </button>

          <button onclick="logout()" class="btn btn-danger">
            Logout
          </button>
        </div>
      </div>

      <div class="app mx-auto">

        <div class="h1">Job Application List</div>

        <!-- Add Application -->
        <div class="mb-3">
          <input id="company" class="form-control mb-2" placeholder="Company" />
          <input id="role" class="form-control mb-2" placeholder="Role" />
          <input id="recruitmentinfo" class="form-control mb-2" placeholder="Recruitment Info" />
          <input type="file" id="resume" class="form-control mb-2" />
          <input id="jobpostinglink" class="form-control mb-2" placeholder="Job Posting Link" />

          <select id="status" class="form-control mb-2">
            <option value="applied">Applied</option>
            <option value="interview">Interview</option>
            <option value="rejected">Rejected</option>
            <option value="offer">Offer</option>
          </select>

          <select id="priority" class="form-control mb-2">
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
          </select>

          <button onclick="createApplication()" class="btn btn-success w-100">
            Add Application
          </button>
        </div>

        <!-- Search / Filter -->
        <div class="mb-3">
          <input id="searchCompany" class="form-control mb-2" placeholder="Search by company" />

          <select id="filterStatus" class="form-control mb-2">
            <option value="">All Status</option>
            <option value="applied">Applied</option>
            <option value="interview">Interview</option>
            <option value="rejected">Rejected</option>
            <option value="offer">Offer</option>
          </select>

          <button onclick="getAllApplications()" class="btn btn-primary w-100">
            Apply Search / Filter
          </button>
        </div>

        <!-- Applications -->
        <div id="todos"></div>

        <!-- Stats -->
        <div class="mt-4">
          <h4>Application Statistics</h4>

          <div class="mb-3">
            <strong>Total Applications:</strong> <span id="totalApps">0</span><br>
            <strong>Interview Rate:</strong> <span id="interviewRate">0%</span><br>
            <strong>Offer Rate:</strong> <span id="offerRate">0%</span>
          </div>

          <canvas id="statusChart"></canvas>

          <div class="mt-4">
            <canvas id="priorityChart"></canvas>
          </div>
        </div>

      </div>
    </div>
  </div>


  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="/static/main.js"></script>

</body>
</html>
