<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Background</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@500&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body class="p-4">

<div class="container">

        <!-- TOP BAR-->
        <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Find New Jobs</h2>
        <div id="userInfo"></div>
        <div>
          <button onclick="goToApp()" class="btn me-2">
            My Applications
          </button>

          <button onclick="goToBackground()" class="btn me-2">
            My Profile
          </button>

          <button onclick="goToJobs()" class="btn disabled me-2">
            Job Search
          </button>

          <button onclick="logout()" class="btn me-2">
            Log out
          </button>
        </div>
      </div>

  <!-- JOB RECOMMENDATIONS -->
    <!--
  <div class="mb-4">
    <h4>Job Recommendations</h4>
    <p id="jobLimitHint" class="small border rounded p-2 bg-body-secondary" style="display: block;"></p>
 ---->
    <!-- FIND JOBS -->
    <div class="mb-4">
    <h5>Search by: </h5>
    <div class="input-group mb-3">
      <input id="titleKeywordsInput" class="form-control" placeholder="Enter job title or keywords">
      <button onclick="getJobs()" class="btn btn-primary">
        Search
      </button>
    </div>
    <div class="input-group mb-3">
      <input id="cityInput" class="form-control" placeholder="Enter city or state">
      <button onclick="getJobs()" class="btn btn-primary">
        Search
      </button>
    </div>

    <div id="jobResults" class="row g-3"></div>
  </div>

    <!-- SAVED JOBS -->
  <div class="mb-4">
    <h5>Saved Jobs</h5>
    <ul id="savedJobsList" class="list-group"></ul>
  </div>

</div>

<script src="/static/search.js"></script>
<script src="/static/background.js"></script>
<script src="/static/main.js"></script>

</body>
</html>
